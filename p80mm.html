<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Consulta de Dados</title>
    <style>
        /* 基础重置与背景 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 20px 15px; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh;
        }
        
        /* 核心卡片容器：手机端全宽，电脑端居中限制宽度 */
        .mobile-container { 
            background: #ffffff; 
            width: 100%; 
            max-width: 420px; /* 电脑端最大宽度 */
            border-radius: 16px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.06); 
            padding: 30px 20px; 
            box-sizing: border-box; 
        }

        /* 品牌 Logo 区域 */
        .logo-container { 
            text-align: center; 
            margin-bottom: 25px; 
        }
        .logo-container img { 
            max-width: 180px; /* 限制Logo最大宽度 */
            height: auto; 
            border-radius: 8px; /* 如果logo是方形的，加点圆角会更好看 */
        }

        h2 { 
            text-align: center; 
            color: #2c3e50; 
            font-size: 22px; 
            margin-top: 0; 
            margin-bottom: 25px; 
            font-weight: 600;
        }

        /* 表单控件样式 */
        .form-group { margin-bottom: 18px; }
        label { 
            display: block; 
            font-size: 14px; 
            color: #555; 
            margin-bottom: 8px; 
            font-weight: 500;
        }
        input, select { 
            width: 100%; 
            padding: 14px 12px; 
            border: 1px solid #e2e8f0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; /* 16px 防止 iOS 自动放大屏幕 */
            background-color: #f8fafc;
            color: #333;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: #fff;
        }

        /* 按钮样式 */
        button { 
            width: 100%; 
            padding: 15px; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            transition: background 0.2s;
        }
        button:active { background: #2563eb; transform: translateY(1px); }

        /* 结果展示区 */
        #resultBox { 
            margin-top: 25px; 
            padding: 20px; 
            border-radius: 12px; 
            background: #f8fafc; 
            border: 1px solid #e2e8f0; 
            display: none; 
            font-size: 15px; 
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 结果列表的排版 */
        .result-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 10px 0; 
            border-bottom: 1px dashed #cbd5e1; 
        }
        .result-item:last-child { border-bottom: none; padding-bottom: 0; }
        .result-label { color: #64748b; }
        .result-value { font-weight: 600; color: #0f172a; }
        
        .status-msg { text-align: center; font-weight: bold; color: #ef4444; padding: 10px 0; }
        .loading-msg { text-align: center; color: #64748b; padding: 10px 0; }
        .success-title { text-align: center; margin-bottom: 15px; font-weight: bold; color: #10b981; font-size: 18px;}
    </style>
</head>
<body>

<div class="mobile-container">
    <div class="logo-container">
        <img src="https://backend-42w.pages.dev/logo/p80.png" alt="Logotipo da Marca" id="brandLogo">
    </div>

    <h2>Consulta de Dados</h2>

    <div class="form-group">
        <label>Data da Consulta (Obrigatório)</label>
        <input type="date" id="queryDate">
    </div>

    <div class="form-group">
        <label>Selecione o Método de Busca</label>
        <select id="queryType">
            <option value="channel">Buscar por Código do Canal</option>
            <option value="id">Buscar por ID da Conta</option>
        </select>
    </div>

    <div class="form-group">
        <label>Insira o Valor</label>
        <input type="text" id="queryValue" placeholder="Digite o Código do Canal ou ID">
    </div>

    <button onclick="fetchAndSearch()">CONSULTAR AGORA</button>

    <div id="resultBox"></div>
</div>

<script>
    // 【修改点1】以后直接把新的 CSV 链接粘贴在双引号里面，不需要任何转码！
    const _dbUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR74YtbLVWAdARSVJ6UVpvGbhcTm_hhhw5Lhv1eerTSF_On9wxpz_oyqAUmvIBxAv8esgK_uKcN98_C/pub?output=csv";

    async function fetchAndSearch() {
        const rawInputDate = document.getElementById('queryDate').value;
        const queryType = document.getElementById('queryType').value;
        const queryValue = document.getElementById('queryValue').value.trim();
        const resBox = document.getElementById('resultBox');

        if (!rawInputDate) { alert("Por favor, selecione a data da consulta!"); return; }
        if (!queryValue) { alert("Por favor, insira o valor da busca!"); return; }

        // 统一格式化网页输入的日期
        const inputDate = rawInputDate.replace(/\//g, '-').trim();

        resBox.style.display = 'block';
        resBox.innerHTML = '<div class="loading-msg">Consultando dados, por favor aguarde...</div>';

        try {
            // 【修改点2】去掉了 atob() 解密，直接使用明文链接，并保留了“缓存粉碎机”
            const freshUrl = _dbUrl + "&t=" + new Date().getTime();
            
            const response = await fetch(freshUrl);
            const csvText = await response.text();
            
            const rows = csvText.split('\n').map(row => {
                return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim());
            });
            
            let matchData = null;

            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (row.length < 7) continue; 

                // 智能日期格式兼容 (支持国际和巴西格式)
                let sheetDate = row[1].replace(/\//g, '-').trim(); 
                let dateParts = sheetDate.split('-');
                if(dateParts.length === 3) {
                    if (dateParts[0].length === 4) {
                        sheetDate = `${dateParts[0]}-${dateParts[1].padStart(2, '0')}-${dateParts[2].padStart(2, '0')}`;
                    } else if (dateParts[2].length === 4) {
                        sheetDate = `${dateParts[2]}-${dateParts[1].padStart(2, '0')}-${dateParts[0].padStart(2, '0')}`;
                    }
                }

                if (sheetDate === inputDate) {
                    if (queryType === 'channel' && row[0] === queryValue) {
                        matchData = row; break;
                    } else if (queryType === 'id' && row[2] === queryValue) {
                        matchData = row; break;
                    }
                }
            }

            if (matchData) {
                resBox.innerHTML = `
                    <div class="success-title">✓ Consulta Concluída</div>
                    <div class="result-item"><span class="result-label">Código do Canal</span><span class="result-value">${matchData[0]}</span></div>
                    <div class="result-item"><span class="result-label">Data</span><span class="result-value">${matchData[1]}</span></div>
                    <div class="result-item"><span class="result-label">ID da Conta</span><span class="result-value">${matchData[2]}</span></div>
                    <div class="result-item"><span class="result-label">Cadastros</span><span class="result-value">${matchData[3]}</span></div>
                    <div class="result-item"><span class="result-label">Primeiros Depósitos</span><span class="result-value">${matchData[4]}</span></div>
                    <div class="result-item"><span class="result-label">Valor de Depósito</span><span class="result-value" style="color:#eab308;">R$ ${matchData[5]}</span></div>
                    <div class="result-item"><span class="result-label">Valor de Saque</span><span class="result-value" style="color:#ef4444;">R$ ${matchData[6]}</span></div>
                `;
            } else {
                resBox.innerHTML = '<div class="status-msg">Aguarde, dados em sincronização.</div>';
            }

        } catch (error) {
            resBox.innerHTML = '<div class="status-msg">Erro de rede. Por favor, atualize a página e tente novamente.</div>';
        }
    }
</script>

</body>
</html>
